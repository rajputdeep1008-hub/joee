<!DOCTYPE html>
<html>
<head>
    <title>CSS Types Example</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="number4b.css">

    <!-- Internal CSS -->
    <style>
        p{
            color: blue;
            font-size: 18px;
        }

        table{
            border-collapse: collapse;
            width: 50%;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color:red; text-align:center;">
        Welcome to CSS
    </h1>

    <p>
        This paragraph is styled using internal CSS.
    </p>

    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>

        <tr>
            <td>Deep</td>
            <td>19</td>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>20</td>
        </tr>
    </table>

</body>
</html>
